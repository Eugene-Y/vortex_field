<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortex Field</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #888;
    }

    #fields {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .field-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .field-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #canvas-container {
      position: relative;
      display: inline-block;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    #labels {
      display: flex;
      justify-content: space-around;
      margin-top: 8px;
    }

    #field-controls {
      display: flex;
      /* gap and child widths set by JS to match canvas layout */
      margin-top: 16px;
    }

    #physics-controls {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 32px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .control-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .control-row input[type=range] {
      flex: 1;
      accent-color: #888;
    }

    .control-value {
      font-size: 10px;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="fields">
    <div id="canvas-container">
      <canvas id="canvas-main"></canvas>
      <div id="labels">
        <span class="field-label">Field A — Velocity</span>
        <span class="field-label">Field B — Rotation Centers</span>
      </div>
      <div id="field-controls">
        <div id="controls-velocity"></div>
        <div id="controls-rotation"></div>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
